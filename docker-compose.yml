version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: gymato_postgres
    restart: always
    environment:
      POSTGRES_DB: gym_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Clokwalk@1234$
    volumes:
      - gymato_postgres_data:/var/lib/postgresql/data
    networks:
      - gymato_internal

  backend:
    build: ./server
    container_name: gymato_backend
    restart: always
    env_file:
      - ./server/.env
    expose:
      - "5000"
    depends_on:
      - postgres
    networks:
      - gymato_internal
      - proxy_net

  frontend:
    build: ./client
    container_name: gymato_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - gymato_internal
      - proxy_net

volumes:
  gymato_postgres_data:

networks:
  gymato_internal:
  proxy_net:
    external: true
